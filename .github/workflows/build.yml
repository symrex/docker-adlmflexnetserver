name: Build and Push to GHCR

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version (YYYYMMDD format)'
        required: false
        default: ''
      no-cache:
        description: 'Drop build cache (for corrupted cache recovery)'
        required: false
        default: 'false'

jobs:
  hadolint:
    name: Hadolint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-criteria: warning

  build:
    name: Build and Push (Distroless)
    runs-on: ubuntu-latest
    needs: hadolint
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set date version
        id: date_version
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$(date +%Y%m%d)" >> $GITHUB_OUTPUT
          fi

      - name: Read NLM_URL from example.env
        id: nlm_url
        run: |
          set -euo pipefail
          NLM_URL=$(grep '^ADM_FLEXNET_NLM_URL=' example.env 2>/dev/null | head -1 | cut -d'=' -f2- || true)
          if [ -z "$NLM_URL" ]; then
            NLM_URL="https://damassets.autodesk.net/content/dam/autodesk/www/files/linux/nlm11-19-4-1-ipv4-ipv6-linux64.tar.gz"
          fi
          printf 'NLM_URL<<EOF\n%s\nEOF\n' "$NLM_URL" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (Distroless)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.date_version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}:latest
          build-args: |
            NLM_URL=${{ steps.nlm_url.outputs.NLM_URL }}
            TARGET_TYPE=gcr.io/distroless/static-debian12:nonroot
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache: ${{ github.event.inputs.no-cache == 'true' }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true
          annotations: |
            io.github.build.version=${{ steps.date_version.outputs.VERSION }}
            io.github.build.timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)

      - name: Add build summary
        if: always()
        run: |
          set -euo pipefail
          STATUS="success"
          if [ "${{ job.status }}" != "success" ]; then
            STATUS="failure"
          fi
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${STATUS}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.date_version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ghcr.io/${{ github.repository }}:${{ steps.date_version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
