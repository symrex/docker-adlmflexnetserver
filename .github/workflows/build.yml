name: Build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '3 2 1 * *'
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      no-cache:
        description: 'Drop build cache'
        required: false
        default: 'false'

permissions:
  contents: read

env:
  LOCAL_IMAGE: adlmflexnetserver:ci
  TARGET_TYPE: gcr.io/distroless/base-debian12:nonroot

jobs:
  build:
    name: Lint, Build and Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-criteria: warning

      - name: Resolve NLM URL
        id: nlm_url
        run: |
          set -euo pipefail
          NLM_URL="$(grep '^ADM_FLEXNET_NLM_URL=' example.env 2>/dev/null | head -1 | cut -d'=' -f2- || true)"
          if [ -z "$NLM_URL" ]; then
            echo "ADM_FLEXNET_NLM_URL is required in example.env" >&2
            exit 1
          fi
          printf 'NLM_URL<<EOF\n%s\nEOF\n' "$NLM_URL" >> "$GITHUB_OUTPUT"

      - name: Set build metadata
        id: metadata
        run: |
          set -euo pipefail
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ env.LOCAL_IMAGE }}
          build-args: |
            NLM_URL=${{ steps.nlm_url.outputs.NLM_URL }}
            TARGET_TYPE=${{ env.TARGET_TYPE }}
            BUILD_DATE=${{ steps.metadata.outputs.BUILD_DATE }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs['no-cache'] == 'true' }}

      - name: Smoke test lmutil
        run: |
          set -euo pipefail
          docker run --rm \
            --platform linux/amd64 \
            --entrypoint /opt/flexnetserver/lmutil \
            "${LOCAL_IMAGE}" lmhostid

      - name: Add build summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "## Build Summary"
            echo "- Status: ${{ job.status }}"
            echo "- Local image: ${LOCAL_IMAGE}"
            echo "- Distribution: not published"
            echo "- Smoke test: lmutil lmhostid"
          } >> "$GITHUB_STEP_SUMMARY"
