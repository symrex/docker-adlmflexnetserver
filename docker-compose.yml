services:
  admflexnet:
    image: ${ADM_FLEXNET_IMAGE:-adlmflexnetserver:local}
    platform: ${ADM_FLEXNET_PLATFORM:-linux/amd64}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NLM_URL: ${ADM_FLEXNET_NLM_URL}
    hostname: ${ADM_FLEXNET_HOSTNAME}
    mac_address: ${ADM_FLEXNET_MAC_ADDRESS}
    init: true
    restart: unless-stopped
    command: ${ADM_FLEXNET_COMMAND}
    ports:
      - "2080:2080"
      - "27000-27009:27000-27009"
    volumes:
      - ./licenses/latest.lic:/usr/local/flexlm/licenses/license.dat:ro
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD", "lmutil", "lmstat", "-a", "-c", "/usr/local/flexlm/licenses/license.dat"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
